{% extends "base.html" %}
{% block title %}Choisir un rôle — Simlog{% endblock %}
{% block content %}
<style>
  /* ---- Hero de choix de rôle (scopé à cette page) ---- */
  main.login-wrap.role-hero{
    min-height:100vh; padding:24px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0a3d6e 0%,#0d5a9c 34%,#1a7f93 70%,#2a8f6b 100%);
  }
  .role-card{ width:100%; max-width:760px; }
  .role-grid{
    display:flex; align-items:center; gap:clamp(24px,5vw,56px);
    color:#fff; flex-wrap:wrap; justify-content:center;
  }
  .role-logo{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .role-logo .badge{
    width:104px; height:104px; border-radius:24px; background:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 40px rgba(0,0,0,.22);
  }
  .role-logo .bars{ display:flex; flex-direction:column; gap:9px; align-items:flex-start; }
  .role-logo .bars i{ display:block; height:11px; border-radius:6px; background:rgba(255,255,255,.92); }
  .role-logo .bars i:nth-child(1){ width:118px; }
  .role-logo .bars i:nth-child(2){ width:118px; }
  .role-logo .bars i:nth-child(3){ width:84px; }

  .role-body{ flex:1 1 300px; min-width:280px; }
  .role-eyebrow{ font-size:15px; color:rgba(255,255,255,.82); margin:0 0 2px; }
  .role-title{ font-size:clamp(30px,5vw,40px); font-weight:700; letter-spacing:-.02em; margin:0 0 12px; color:#fff; }
  .role-sub{ font-size:14px; font-weight:600; color:rgba(255,255,255,.92); margin:0 0 6px; }
  .role-centre{ font-size:13px; color:rgba(255,255,255,.72); margin:0 0 22px; }
  .role-centre b{ color:#fff; font-weight:600; }

  .role-actions{ display:flex; gap:14px; flex-wrap:wrap; }
  .role-pill{
    flex:1 1 170px; min-width:150px; text-align:center; cursor:pointer;
    padding:14px 18px; border-radius:999px; border:1px solid rgba(255,255,255,.28);
    background:linear-gradient(180deg,#3a9bea 0%,#1f7fd0 100%);
    color:#fff; font-family:var(--sans); line-height:1.2;
    box-shadow:0 8px 20px rgba(0,0,0,.18); transition:transform .08s ease, box-shadow .12s ease, filter .12s ease;
  }
  .role-pill:hover{ filter:brightness(1.06); box-shadow:0 10px 26px rgba(0,0,0,.24); }
  .role-pill:active{ transform:translateY(1px); }
  .role-pill .lab{ display:block; font-size:16px; font-weight:600; letter-spacing:.01em; }
  .role-pill .desc{ display:block; font-size:11.5px; font-weight:400; opacity:.85; margin-top:3px; }
  .role-pill.is-instr{ background:linear-gradient(180deg,#5db0f2 0%,#2f8fdc 100%); }

  .role-foot{ margin-top:22px; }
  .role-foot a{ font-size:13px; color:rgba(255,255,255,.78); }
  .role-foot a:hover{ color:#fff; text-decoration:underline; }

  @media (max-width:560px){
    .role-grid{ flex-direction:column; text-align:center; }
    .role-actions{ justify-content:center; }
  }
</style>

<div class="role-card">
  <form method="post" action="{{ url_for('choisir_role') }}">
    <div class="role-grid">

      <div class="role-logo" aria-hidden="true">
        <span class="badge">
          <svg width="58" height="58" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 13v-1a7 7 0 0 1 14 0v1" stroke="#0d5a9c" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="3.3" y="12.4" width="3.4" height="6" rx="1.5" fill="#0d5a9c"/>
            <rect x="17.3" y="12.4" width="3.4" height="6" rx="1.5" fill="#0d5a9c"/>
            <path d="M19 18.4v.6a3 3 0 0 1-3 3h-3" stroke="#0d5a9c" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="22" r="1.15" fill="#0d5a9c"/>
          </svg>
        </span>
        <span class="bars"><i></i><i></i><i></i></span>
      </div>

      <div class="role-body">
        <p class="role-eyebrow">Simulateurs CDG</p>
        <h1 class="role-title">Logs de simulation</h1>
        <p class="role-sub">Choisissez votre rôle pour commencer.</p>
        <p class="role-centre">Connecté · <b>{{ centre_nom }}</b> ({{ centre_code }})</p>

        <div class="role-actions">
          <button type="submit" name="role" value="instructeur" class="role-pill is-instr">
            <span class="lab">Instructeur</span>
            <span class="desc">Attendus pédago + tickets</span>
          </button>
          <button type="submit" name="role" value="pilote" class="role-pill">
            <span class="lab">PER</span>
            <span class="desc">Déroulé radio uniquement</span>
          </button>
        </div>

        <div class="role-foot">
          <a href="{{ url_for('logout') }}">← Changer d'aéroport</a>
        </div>
      </div>

    </div>
  </form>
</div>
{% endblock %}
